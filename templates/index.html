<style>
.help-inline {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.help-tip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #3f51b5;
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  line-height: 1;
  cursor: help;
  position: relative;
  top: -3px;
}
.ui-input-text {
  width: fit-content;
}
#rain_poll_interval {
  width: 80px;
}
#event_monitor_interval,
#event_stale_warn_seconds {
  width: 80px;
}
.vlx-card {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 12px;
  margin: 0 0 1em 0;
}
.vlx-card h1,
.vlx-card h2,
.vlx-card h3 {
  margin-top: 0;
}
.vlx-muted {
  color: #666;
  font-size: 0.95em;
}
.notice-success,
.notice-error,
.notice-info {
  border-radius: 6px;
  padding: 10px 12px;
  margin: 0 0 1em 0;
}
.notice-success { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
.notice-error   { background: #ffebee; color: #b71c1c; border: 1px solid #ffcdd2; }
.notice-info    { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
.vlx-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 980px;
}
.vlx-linkbox {
  display: inline-block;
  padding: 10px 14px;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  background: #f7f7f7;
  text-decoration: none;
  color: #6dac20 !important;
}

.vlx-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  flex-direction: row-reverse;
}
.vlx-hero-text {
  flex: 1 1 320px;
  min-width: 0;
}
.vlx-hero-logo {
  flex: 0 0 auto;
  margin-left: auto;
  text-align: right;
}
.vlx-hero-logo img {
  display: block;
  width: 128px;
  max-width: 100%;
  height: auto;
}
@media (max-width: 900px) {
  .vlx-grid-2 {
    grid-template-columns: 1fr;
  }
  .vlx-hero {
    align-items: flex-start;
  }
  .vlx-hero-logo {
    width: 100%;
    margin-left: 0;
    text-align: right;
  }
  .vlx-hero-logo img {
    width: 72px;
  }
}
.ui-checkbox .ui-btn {
  display: inline-block !important;
  width: 300px !important;
  box-sizing: border-box !important;
}
#topic_identifier-button {
  width: 240px !important;
}

/* Loxone Config export */
.vlx-export-links { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:.6em 0; }
.vlx-export-links a { min-width:88px; text-align:center; }
.vlx-export-info { font-size:.9em; color:#555; margin:.4em 0 .6em 0; }
.vlx-text2value { margin-top:.7em; border:1px solid #ddd; border-radius:6px; padding:8px 10px; background:#fff; }
.vlx-text2value summary { cursor:pointer; /* font-weight:bold; */ }
.vlx-text2value pre { white-space:pre-wrap; user-select:all; background:#f7f7f7; border:1px solid #ddd; padding:8px; border-radius:4px; }
.vlx-service-status { width:100%; text-align:center; margin-top:2px; }

</style>

<script>
const I18N = {
  serviceError: '<TMPL_VAR UI.SERVICE_ERROR>',
  restarting: '<TMPL_VAR UI.RESTARTING>',
  restartFailed: '<TMPL_VAR UI.RESTART_FAILED>',
  stopping: '<TMPL_VAR UI.STOPPING>',
  stopFailed: '<TMPL_VAR UI.STOP_FAILED>',
  unknown: '<TMPL_VAR UI.UNKNOWN>'
};

function setServiceState(msg, color, pid, klfStatus) {
  document.getElementById('servicestate').innerHTML =
    '<span style="color:' + color + '">' +
      msg + ' | PID: ' + (pid || '-') + ' | KLF: ' + (klfStatus || I18N.unknown) +
    '</span>';
}

function postAjax(body) {
  return fetch('index.cgi', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  }).then(r => r.json());
}

function loadServiceStatus() {
  postAjax('ajax=statusvlx')
    .then(d => {
      let color = 'gray';
      if (d.state === 'active') color = 'green';
      if (d.error) color = 'red';
      setServiceState(d.message || d.state || I18N.unknown, color, d.pid, d.klf_status);
    })
    .catch(() => setServiceState(I18N.serviceError, 'red', '-', I18N.unknown));
}

function restartService() {
  setServiceState(I18N.restarting, 'blue', '…', I18N.unknown);
  postAjax('ajax=restartvlx')
    .then(() => setTimeout(loadServiceStatus, 1500))
    .catch(() => setServiceState(I18N.restartFailed, 'red', '-', I18N.unknown));
}

function stopService() {
  setServiceState(I18N.stopping, 'orange', '…', I18N.unknown);
  postAjax('ajax=stopvlx')
    .then(() => setTimeout(loadServiceStatus, 1000))
    .catch(() => setServiceState(I18N.stopFailed, 'red', '-', I18N.unknown));
}

setInterval(loadServiceStatus, 5000);
document.addEventListener('DOMContentLoaded', loadServiceStatus);
</script>
