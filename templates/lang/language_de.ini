INVALID_RECOVERY_THRESHOLD=Recovery Threshold ungültig.
INVALID_RECOVERY_COOLDOWN=Recovery Cooldown ungültig.
INVALID_RECOVERY_GRACE=Recovery Grace ungültig.
INVALID_PREVENTIVE_RECOVERY=Präventiver Power-Cycle ungültig.
INVALID_TOPIC_IDENTIFIER=Topic Identifier ungültig.
