[HELP]
KLF_HOST=Hostname oder IP-Adresse der VELUX KLF200 / Homecontrol IO.
KLF_PW=WiFi-Passwort der VELUX KLF200.
MQTT_HOST=Hostname oder IP-Adresse des MQTT-Brokers.
MQTT_PORT=Port des MQTT-Brokers, normalerweise 1883.
MQTT_USER=Benutzername für die Anmeldung am MQTT-Broker.
MQTT_PW=Passwort für die Anmeldung am MQTT-Broker.
ROOT_TOPIC=Oberstes MQTT-Topic des Plugins, z. B. vlx2mqtt.
INITIAL_DELAY=Wartezeit nach dem Start, bevor der erste Snapshot publiziert wird.
CONNECT_TIMEOUT=Maximale Wartezeit für den Verbindungsaufbau zur KLF200.
MOVING_TIMEOUT=Watchdog-Zeit für laufende Bewegungen.
BACKOFF_MAX=Maximale Wartezeit zwischen zwei Wiederverbindungsversuchen.
TOPIC_IDENTIFIER=Legt fest, ob MQTT-Topics den Gerätenamen oder die node_id verwenden.
RAIN_POLL_INTERVAL=Intervall für die indirekte Regenstatus-Abfrage an unterstützten Fenstern.
VERBOSE_LOGGING=Aktiviert ausführliche Debug-Meldungen im Plugin-Log.
PUBLISH_RAIN_RAW_LIMIT=Veröffentlicht zusätzlich den Rohwert der regenbezogenen Öffnungsbegrenzung als MQTT-Topic rain_raw_limit.
ENABLE_EXTERNAL_RECOVERY=Fordert bei wiederholten relevanten KLF-Fehlern einen externen Power-Cycle an.
RECOVERY_THRESHOLD=Anzahl relevanter Fehler bis Recovery ausgelöst wird.
RECOVERY_COOLDOWN=Mindestabstand zwischen Recovery-Aktionen.
RECOVERY_GRACE=Wartezeit nach einer Recovery-Aktion.
PREVENTIVE_RECOVERY=Optionaler präventiver Recovery-Trigger nach X Stunden; veröffentlicht eine vorsorgliche externe Reboot-/Power-Cycle-Anforderung für die KLF200, um Verbindungsproblemen vorzubeugen (0 = deaktiviert).
RECOVERY_TOPIC=MQTT-Topic für den externen Power-Cycle-Trigger.
EVENT_MONITOR_INTERVAL=Prüft regelmäßig, ob Node-Update-Events vom KLF empfangen wurden. Dies ist nur ein Diagnosemonitor und pollt keine Positionen.
EVENT_STALE_WARN_SECONDS=Wenn so lange kein Node-Update-Event vom KLF empfangen wurde, obwohl die Verbindung steht und nichts fährt, wird eine Warnung ins Log geschrieben. Positionen bleiben weiterhin rein eventbasiert.

