[HELP]
KLF_HOST=Hostname or IP address of the VELUX KLF200 / Homecontrol IO.
KLF_PW=WiFi password of the VELUX KLF200.
MQTT_HOST=Hostname or IP address of the MQTT broker.
MQTT_PORT=Port of the MQTT broker, usually 1883.
MQTT_USER=Username for MQTT broker authentication.
MQTT_PW=Password for MQTT broker authentication.
ROOT_TOPIC=Top-level MQTT topic of the plugin, e.g. vlx2mqtt.
INITIAL_DELAY=Delay after startup before publishing the first snapshot.
CONNECT_TIMEOUT=Maximum wait time for establishing the connection to the KLF200.
MOVING_TIMEOUT=Watchdog time for ongoing movements.
BACKOFF_MAX=Maximum wait time between reconnect attempts.
TOPIC_IDENTIFIER=Defines whether MQTT topics use the device name or the node_id.
RAIN_POLL_INTERVAL=Polling interval for indirect rain status detection on supported windows.
VERBOSE_LOGGING=Enables detailed debug messages in the plugin log.
PUBLISH_RAIN_RAW_LIMIT=Additionally publishes the raw value of the rain-related opening limitation as MQTT topic rain_raw_limit.
ENABLE_EXTERNAL_RECOVERY=Requests an external power cycle after repeated relevant KLF errors.
RECOVERY_THRESHOLD=Number of relevant errors before recovery is triggered.
RECOVERY_COOLDOWN=Minimum time between recovery actions.
RECOVERY_GRACE=Wait time after a recovery action.
PREVENTIVE_RECOVERY=Optional preventive recovery trigger after X hours; publishes a preventive external reboot/power-cycle request for the KLF200 to help avoid connection issues (0 = disabled).
RECOVERY_TOPIC=MQTT topic for the external power-cycle trigger.
EVENT_MONITOR_INTERVAL=Checks periodically whether node update events have been received from the KLF. This is only a diagnostic monitor and does not poll positions.
EVENT_STALE_WARN_SECONDS=If no node update event is received from the KLF for this long while connected and idle, a warning is written to the log. Positions remain event-driven and are not actively polled.

