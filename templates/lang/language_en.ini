LOXONE_MINI_GUIDE_TITLE=Mini guide: XML export, status codes and README
LOXONE_MINI_GUIDE_XML_TITLE=Which file is used for what?
LOXONE_MINI_GUIDE_XML_VIU=Import VIU_VLX2MQTT.xml into Loxone Config as virtual UDP inputs. It contains position, moving, rain and the new status-code inputs.
LOXONE_MINI_GUIDE_XML_VO=Import VO_VLX2MQTT.xml into Loxone Config as virtual outputs. It contains UP, DOWN, STOP and SET 0..100.
LOXONE_MINI_GUIDE_ZIP=ZIP contains VIU_VLX2MQTT.xml, VO_VLX2MQTT.xml and README_Loxone_Export.txt together. If the browser blocks it, use the single downloads.
LOXONE_MINI_GUIDE_STATUS_TITLE=Status codes for Loxone
LOXONE_MINI_GUIDE_STATUS_CODE=ok=1, error=0
LOXONE_MINI_GUIDE_KLF_CODE=klf_connected=1, klf_connecting=2, klf_disconnected=3, klf_unreachable=4, further errors from 5, unknown=99
LOXONE_MINI_GUIDE_SERVICE_CODE=running=1, starting=2, stopped/lost/error=0, unknown=99
LOXONE_MINI_GUIDE_RECOVERY_CODE=idle=0, requested=1, waiting=2
LOXONE_MINI_GUIDE_README=The README also contains the detected node list and export-host notes. Text-to-value conversion is normally no longer needed for the new *_code topics.

